name: Build flyer PDF

on:
  push:
    paths:
      - 'flyer.html'
      - 'site-qr.png'
      - 'tg-qr.png'
      - '.github/scripts/print.js'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Render flyer.pdf
        run: node .github/scripts/print.js

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: flyer-pdf
          path: flyer.pdf

      - name: Commit PDF back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flyer.pdf
          git diff --staged --quiet || git commit -m "build: regenerate flyer.pdf [skip ci]"
          git push
