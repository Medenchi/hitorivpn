name: Build flyer PDF

on:
  push:
    paths:
      - 'flyer.html'
      - 'poster.html'
      - 'site-qr.png'
      - 'tg-qr.png'
      - '.github/scripts/print.js'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium
      - name: Render PDFs
        run: |
          node .github/scripts/print.js flyer.html flyer.pdf
          node .github/scripts/print.js poster.html poster.pdf
      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flyers-pdf
          path: |
            flyer.pdf
            poster.pdf
      - name: Commit PDFs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flyer.pdf poster.pdf
          git diff --staged --quiet || git commit -m "build: regenerate PDFs [skip ci]"
          git push
