<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Объявление · Чат подъезда · Миля 19</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14161c;
    --ink-2: #3d4250;
    --ink-3: #6b7180;
    --line: #d9dce3;
    --paper: #ffffff;
    --band: #14161c;
    --accent: #3b4fd6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #e9ebef;
    font-family: "Golos Text", system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .sheet {
    width: 210mm; height: 297mm; margin: 20px auto;
    background: var(--paper); padding: 8mm;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0;
    box-shadow: 0 8px 40px rgba(20,22,28,0.18);
  }
  .card { position: relative; padding: 5mm 5mm; display: flex; flex-direction: column; overflow: hidden; }
  .card::after { content: ""; position: absolute; inset: 0; border: 1px dashed var(--line); pointer-events: none; }
  .band { background: var(--band); color: #fff; border-radius: 9px; padding: 7px 9px 8px; text-align: center; }
  .badge { display: inline-block; border: 1px solid rgba(255,255,255,0.55); border-radius: 999px; font-size: 7pt; font-weight: 700; letter-spacing: 0.05em; padding: 1px 8px; margin-bottom: 4px; }
  .band h1 { font-size: 13.5pt; font-weight: 900; letter-spacing: -0.01em; line-height: 1.05; }
  .band .addr { font-size: 7.5pt; font-weight: 500; color: rgba(255,255,255,0.82); margin-top: 2px; }
  .points { list-style: none; margin: 8px 0 2px; }
  .points li { position: relative; padding-left: 13px; font-size: 8pt; line-height: 1.32; color: var(--ink-2); margin-bottom: 5px; }
  .points li::before { content: ""; position: absolute; left: 0; top: 5px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .points b { color: var(--ink); font-weight: 700; }
  .qr-row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin: 4px 0 7px; }
  .qr-box { border: 1.5px solid var(--line); border-radius: 9px; padding: 6px 5px 5px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .qr-box.primary { border-color: var(--ink); }
  .qr-img { width: 100px; height: 100px; display: grid; place-items: center; overflow: hidden; border-radius: 4px; }
  .qr-img img { width: 100px; height: 100px; object-fit: contain; display: block; }
  /* ТГ-код приходит с широкими белыми полями — увеличиваем и подрезаем края */
  .qr-img.big img { width: 132px; height: 132px; }
  .qr-cap { font-size: 7.5pt; font-weight: 700; line-height: 1.12; }
  .qr-sub { font-size: 6.5pt; color: var(--ink-3); margin-top: -2px; }
  .howto { background: #f4f5f8; border-radius: 8px; padding: 6px 8px; font-size: 7.2pt; line-height: 1.36; color: var(--ink-2); }
  .howto b { color: var(--ink); font-weight: 700; }
  .foot { margin-top: auto; padding-top: 6px; text-align: center; }
  .foot .only { font-size: 6.8pt; color: var(--ink-3); }
  .foot .keep { font-size: 8pt; font-weight: 800; letter-spacing: 0.01em; margin-top: 2px; }
  @page { size: A4; margin: 0; }
  @media print {
    html, body { background: #fff; }
    .sheet { width: 210mm; height: 297mm; margin: 0; box-shadow: none; }
    .card::after { border-color: #c2c6cf; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .toolbar { display: none !important; }
  }
  .toolbar { max-width: 210mm; margin: 20px auto 0; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 13px; color: var(--ink-2); }
  .toolbar button { font-family: inherit; font-weight: 600; font-size: 13px; background: var(--ink); color: #fff; border: none; padding: 9px 16px; border-radius: 9px; cursor: pointer; }
  .toolbar code { background: #fff; padding: 2px 6px; border-radius: 5px; border: 1px solid var(--line); font-size: 12px; }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="window.print()">Печать / сохранить в PDF</button>
  <span>Оба QR — картинки из репы: <code>site-qr.png</code> и <code>tg-qr.png</code>. PDF собирается сам через GitHub Actions.</span>
</div>
<div class="sheet" id="sheet"></div>
<template id="card-tpl">
  <div class="card">
    <div class="band">
      <div class="badge">БЕЗ РЕКЛАМЫ И СПАМА</div>
      <h1>ЧАТ НАШЕГО ПОДЪЕЗДА</h1>
      <div class="addr">ул. Авиаконструктора Миля, 19 · 1-й подъезд</div>
    </div>
    <ul class="points">
      <li><b>Общение и взаимопомощь:</b> знакомимся с соседями, решаем мелкие вопросы.</li>
      <li><b>Сарафанное радио:</b> делимся контактами мастеров, услугами и советами.</li>
      <li><b>Благоустройство:</b> обсуждаем и предлагаем, как улучшить наш дом.</li>
    </ul>
    <div class="qr-row">
      <div class="qr-box">
        <div class="qr-img"><img src="site-qr.png" alt="QR сайт"></div>
        <div><div class="qr-cap">Если лагает ТГ</div><div class="qr-sub">Инструкция и VPN</div></div>
      </div>
      <div class="qr-box primary">
        <div class="qr-img big"><img src="tg-qr.png" alt="QR Telegram"></div>
        <div><div class="qr-cap">Прямой вход</div><div class="qr-sub">в Telegram</div></div>
      </div>
    </div>
    <div class="howto"><b>Как войти:</b> наведите камеру на <b>правый</b> QR — откроется чат. Если Telegram висит на бесконечной загрузке, отсканируйте <b>левый</b> код: там инструкция и рабочий VPN.</div>
    <div class="foot">
      <div class="only">Только для жителей 1-го подъезда</div>
      <div class="keep">СОСЕДИ, ПОЖАЛУЙСТА, НЕ СРЫВАЙТЕ ОБЪЯВЛЕНИЕ!</div>
    </div>
  </div>
</template>
<script>
  const sheet = document.getElementById('sheet');
  const tpl = document.getElementById('card-tpl');
  for (let i = 0; i < 4; i++) sheet.appendChild(tpl.content.cloneNode(true));
</script>
</body>
</html>
